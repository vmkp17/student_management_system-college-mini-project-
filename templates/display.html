<!DOCTYPE html>
<html>
<head>
    <title>Display Students</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>Student Records</h1>

<table>

<tr>
<th>ID</th>
<th>Name</th>
<th>Roll No</th>
<th>Department</th>
<th>Marks</th>
<th>Grade</th>
</tr>

{% for student in students %}

<tr>

<td>{{ student[0] }}</td>
<td>{{ student[1] }}</td>
<td>{{ student[2] }}</td>
<td>{{ student[3] }}</td>
<td>{{ student[4] }}</td>
<td>{{ student[5] }}</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/">
<button>Home</button>
</a>

</div>

</body>
</html>
