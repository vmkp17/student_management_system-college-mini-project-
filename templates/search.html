<!DOCTYPE html>
<html>
<head>
    <title>Search Student</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>Search Student</h1>

<form method="POST">

<input type="text" name="roll" placeholder="Enter Roll Number" required>

<br><br>

<button type="submit">Search</button>

</form>

<br>

{% if student %}

<table>

<tr>

<th>ID</th>
<th>Name</th>
<th>Roll</th>
<th>Department</th>
<th>Marks</th>
<th>Grade</th>

</tr>

<tr>

<td>{{student[0]}}</td>
<td>{{student[1]}}</td>
<td>{{student[2]}}</td>
<td>{{student[3]}}</td>
<td>{{student[4]}}</td>
<td>{{student[5]}}</td>

</tr>

</table>

{% endif %}

<br>

<a href="/">
<button>Home</button>
</a>

</div>

</body>
</html>
